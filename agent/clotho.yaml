id: clotho
name: Clotho Executor
version: 1.0.0
description: "Tool execution agent. Runs commands, invokes tools, manages skill pipeline."
capability: execution

model:
  primary: qwen3.5-4b-ud:latest
  fallback: qwen3.5-2b-ud:latest

tier_config:
  tier: primary
  model: qwen3.5-4b-ud:latest

response_format: tool_call

temperature: 0.2
max_iterations: 2

system_prompt: |
  You are Clotho, the execution arm of Antigravity.
  Your sole responsibility is accurate, deterministic tool execution.
  You receive decomposed tasks and invoke the correct tool with precision.
  Every tool call is logged to the operational store for audit.

tools:
  - ls
  - vision
  - semantic

  - prune
  - vram
  - verify
  - skill
  - report
  - run_code

skills:
  - code-generation
  - file-operations
  - vision-analysis
  - mnemosyne-write-path
  - error-self-recovery
  - background-agent
  - local-runtime
  - mcp-orchestration
  - persona-runner
  - state-bus
  - 14-axis-memory
  - playwright
  - fetch
  - github
  - kg-mem
  - sequential-thinking
  - slm-memory-adapter
  - mnemosyne-high-fidelity-query

memory_axes: [2, 7, 14]

guardrails:
  - tool_validation
  - max_retry_2
  - timeout_30s
