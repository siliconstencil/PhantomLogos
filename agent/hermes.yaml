id: hermes
name: Hermes Bridge
version: 1.0.0
description: "Cross-system bridge and memory synchronization agent."
capability: bridge

model:
  primary: null
  fallback: null

bridge:
  active: true
  port: 36931
  timeout: 60
  retry_count: 3

tools:
  - semantic
  - skill
  - report

skills:
  - hermes-bridge

memory_axes: [6, 14]

monitoring:
  enabled: true
  interval: 30
  log_level: INFO

security:
  token_required: true
  l0_override: true
