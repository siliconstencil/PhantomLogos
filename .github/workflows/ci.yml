name: Phantom Logos CI

on:
  push:
    branches: [ master ]
    paths-ignore:
      - "**.md"
      - ".antigravity/**"
      - "docs/**"
      - "scratch/**"
      - "logs/**"
      - ".gitignore"
      - "LICENSE"
  pull_request:
    branches: [ master ]
    paths-ignore:
      - "**.md"
      - ".antigravity/**"
      - "docs/**"
      - "scratch/**"
      - "logs/**"
      - ".gitignore"
      - "LICENSE"
  schedule:
    - cron: '0 0 * * 0'  # Her Pazar gece yarısı (Sunday at midnight)

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
    - name: Set up Python 3.12
      uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f
      with:
        python-version: "3.12"
        cache: pip
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    - name: Run ruff check
      run: python -m ruff check src/ cognition/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    - name: Create required directories
      run: mkdir -p data
    - name: Run unit tests
      run: |
        pytest tests/ -v -m "not integration and not slow" --timeout=60 \
          --ignore=tests/test_full_pipeline.py \
          --ignore=tests/test_slm_fallback.py \
          --ignore=tests/test_mcp_session.py \
          --ignore=tests/test_slm_mcp_client.py \
          --ignore=tests/test_gateway_circuit_breaker.py \
          --ignore=tests/test_gateway_distillation.py \
          --ignore=tests/test_genai_manager.py \
          --ignore=tests/test_langgraph_checkpoint_persistence.py \
          --ignore=tests/test_gateway_secondary.py \
          --ignore=tests/test_slm_rerank.py \
          --ignore=tests/test_gnosis.py \
          --ignore=tests/test_hermes_bridge.py \
          --ignore=tests/test_mcp_categories.py \
          --ignore=tests/test_a2a_federation.py \
          --ignore=tests/test_sophia_routing.py \
          --ignore=tests/test_skill_calibration.py \
          --ignore=tests/test_tool_bridge.py \
          --ignore=tests/test_two_pass_verification.py \
          --ignore=tests/test_verification_gate.py \
          --ignore=tests/test_failure_memory_integration.py \
          --ignore=tests/test_reranker.py \
          --ignore=tests/test_ankyra_v2.py
      env:
        PYTHONPATH: .
    - name: Coverage report
      run: |
        pytest tests/ --cov=src --cov=cognition --cov-report=term --cov-report=xml --cov-fail-under=30 --timeout=60 \
          --ignore=tests/test_full_pipeline.py \
          --ignore=tests/test_slm_fallback.py \
          --ignore=tests/test_mcp_session.py \
          --ignore=tests/test_slm_mcp_client.py \
          --ignore=tests/test_gateway_circuit_breaker.py \
          --ignore=tests/test_gateway_distillation.py \
          --ignore=tests/test_genai_manager.py \
          --ignore=tests/test_langgraph_checkpoint_persistence.py \
          --ignore=tests/test_gateway_secondary.py \
          --ignore=tests/test_slm_rerank.py \
          --ignore=tests/test_gnosis.py \
          --ignore=tests/test_hermes_bridge.py \
          --ignore=tests/test_mcp_categories.py \
          --ignore=tests/test_a2a_federation.py \
          --ignore=tests/test_sophia_routing.py \
          --ignore=tests/test_skill_calibration.py \
          --ignore=tests/test_tool_bridge.py \
          --ignore=tests/test_two_pass_verification.py \
          --ignore=tests/test_verification_gate.py \
          --ignore=tests/test_failure_memory_integration.py \
          --ignore=tests/test_reranker.py \
          --ignore=tests/test_ankyra_v2.py
      env:
        PYTHONPATH: .
    - name: Upload coverage
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml
      if: always()

  slow-integration-test:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
    - name: Set up Python 3.12
      uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f
      with:
        python-version: "3.12"
        cache: pip
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    - name: Create required directories
      run: mkdir -p data
    - name: Run slow and integration tests
      run: |
        pytest tests/ -v -m "slow or integration" --timeout=120
      env:
        PYTHONPATH: .
