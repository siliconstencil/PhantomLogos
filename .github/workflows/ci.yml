name: Phantom Logos CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
    - name: Set up Python 3.12
      uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f
      with:
        python-version: "3.12"
        cache: pip
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
    - name: Run ruff check
      run: python -m ruff check src/ cognition/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
    - name: Run unit tests
      run: |
        pytest tests/ -v -m "not integration" -x --ignore=tests/test_full_pipeline.py --ignore=tests/test_slm_fallback.py --ignore=tests/test_mcp_session.py --ignore=tests/test_slm_mcp_client.py --ignore=tests/test_gateway_circuit_breaker.py --ignore=tests/test_gateway_distillation.py --ignore=tests/test_genai_manager.py --ignore=tests/test_langgraph_checkpoint_persistence.py --ignore=tests/test_gateway_secondary.py --ignore=tests/test_slm_rerank.py
      env:
        PYTHONPATH: .
    - name: Coverage report
      run: |
        pytest tests/ --cov=src --cov=cognition --cov-report=term --cov-report=xml --cov-fail-under=30 --ignore=tests/test_full_pipeline.py --ignore=tests/test_slm_fallback.py --ignore=tests/test_mcp_session.py --ignore=tests/test_slm_mcp_client.py --ignore=tests/test_gateway_circuit_breaker.py --ignore=tests/test_gateway_distillation.py --ignore=tests/test_genai_manager.py --ignore=tests/test_langgraph_checkpoint_persistence.py --ignore=tests/test_gateway_secondary.py --ignore=tests/test_slm_rerank.py
      env:
        PYTHONPATH: .
    - name: Upload coverage
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml
      if: always()
